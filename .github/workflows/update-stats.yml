name: Update Profile Stats

on:
  schedule:
    # Runs every 6 hours to keep stats fresh
    - cron: '0 */6 * * *'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: GitHub Activity Graph Cache Bust
        run: |
          # Touch README to bust CDN caches on github-readme-stats
          sed -i "s/<!-- LAST_UPDATED:.*-->/<!-- LAST_UPDATED: $(date -u +%Y-%m-%dT%H:%M:%SZ) -->/" README.md || true

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git diff --quiet || (git add -A && git commit -m "chore: refresh profile stats [skip ci]" && git push)
